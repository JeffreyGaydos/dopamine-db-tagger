<link rel="stylesheet" href="../../ui/sequence-form/sequence-form.css">
<form>
    <select id="tag-type">
        <option value="-1" disabled selected style="display: none">Choose a way to tag...</option>
        <option value="Track">by Track</option>
        <option value="Artist">by Artist</option>
    </select>
    <div class="revealable" by="Track">
        <p>Tagging will be presented in alphabetical order. If you were previously tagging, choosing a starting track by name.</p>
    </div>
    <div class="revealable" by="Artist">
        <C src="../../ui/artist-sequence-options/artist-sequence-options.html"></C>
    </div>
    <br/>
    <input id="numeric-start" type="number" value="0">
    <input id="text-start" type="text" value="TEMP - Should show the first track available and be an auto complete. Will use full filename with extension">
</form>
<script src="sequence-form.js"></script>
